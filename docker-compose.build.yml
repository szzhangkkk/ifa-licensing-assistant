# ============================================================
# IFA 上牌小助手 — Docker Compose（构建机专用）
# ============================================================
# 用法:
#   docker compose -f docker-compose.build.yml build --no-cache
#   docker tag ifa-lili-bot:latest registry.cn-hangzhou.aliyuncs.com/ifa/lili-bot:latest
#   docker push registry.cn-hangzhou.aliyuncs.com/ifa/lili-bot:latest
#
# 此文件仅供构建/CI 机使用，部署端请用 docker-compose.yml
# ============================================================

services:
  lili-bot:
    build: .
    image: ifa-lili-bot:latest
    container_name: lili-bot
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - MILVUS_DB_PATH=/app/milvus.db
      - MILVUS_COLLECTION=ifa_licensing_kb
      - CHROMA_DB_PATH=/app/chroma_db
      - CHROMA_COLLECTION=ifa_licensing_kb
      - HF_HUB_OFFLINE=1
      - WORKTOOL_ROBOT_ID=${WORKTOOL_ROBOT_ID}
      - WORKTOOL_API_URL=${WORKTOOL_API_URL:-https://api.worktool.ymdyes.cn/wework/sendRawMessage}
      - SUBMIT_EMAIL=${SUBMIT_EMAIL:-license@example.com}
      - A1_FORM_URL=${A1_FORM_URL}
      - A1_GUIDE_URL=${A1_GUIDE_URL}
      - WECOM_BOT_ID=${WECOM_BOT_ID:-}
      - WECOM_BOT_SECRET=${WECOM_BOT_SECRET:-}
    volumes:
      - lili-data:/tmp
    networks:
      - lili-net
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  ngrok:
    image: ngrok/ngrok:latest
    container_name: lili-ngrok
    restart: unless-stopped
    depends_on:
      lili-bot:
        condition: service_healthy
    command:
      - "http"
      - "lili-bot:5000"
      - "--log=stdout"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTH_TOKEN}
    networks:
      - lili-net
    ports:
      - "4040:4040"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

volumes:
  lili-data:
    name: lili-bot-data

networks:
  lili-net:
    name: lili-network
