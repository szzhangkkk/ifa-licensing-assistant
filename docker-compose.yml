# ============================================================
# IFA 上牌小助手 — Docker Compose
# ============================================================
# 启动:  ./deploy.sh              # 一键 build + up（推荐）
#        docker compose up -d --build
# 停止:  docker compose down
# 日志:  docker compose logs -f lili-bot
#
# 包含两个服务：
#   1. lili-bot     — Flask 回调服务器（核心）
#   2. ngrok        — 内网穿透（可选，有公网 IP 可去掉）
#
# ngrok 需要注册 https://ngrok.com 获取 authtoken
# ============================================================

services:
  # ── 核心服务：Lili Bot Flask 服务器 ──
  lili-bot:
    build: .
    image: ifa-lili-bot:latest
    container_name: lili-bot
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - MILVUS_DB_PATH=/app/milvus.db
      - MILVUS_COLLECTION=ifa_licensing_kb
      - CHROMA_DB_PATH=/app/chroma_db
      - CHROMA_COLLECTION=ifa_licensing_kb
      - HF_HUB_OFFLINE=1
      # 以下从 .env 文件读取
      - WORKTOOL_ROBOT_ID=${WORKTOOL_ROBOT_ID}
      - WORKTOOL_API_URL=${WORKTOOL_API_URL:-https://api.worktool.ymdyes.cn/wework/sendRawMessage}
      - SUBMIT_EMAIL=${SUBMIT_EMAIL:-license@example.com}
      - A1_FORM_URL=${A1_FORM_URL}
      - A1_GUIDE_URL=${A1_GUIDE_URL}
      - WECOM_BOT_ID=${WECOM_BOT_ID:-}
      - WECOM_BOT_SECRET=${WECOM_BOT_SECRET:-}
    volumes:
      # 持久化 pending 状态（避免容器重启丢失）
      - lili-data:/tmp
    networks:
      - lili-net
    # 资源限制（远程服务器资源有限，防止 OOM）
    deploy:
      resources:
        limits:
          memory: 1.5G
          cpus: "2.0"
        reservations:
          memory: 512M
          cpus: "0.5"
    # 日志轮转（防止 json-file 默认无限增长撑爆磁盘）
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  # ── ngrok 内网穿透（可选） ──
  # 有公网 IP 可以注释掉整个 ngrok 服务
  ngrok:
    image: ngrok/ngrok:latest
    container_name: lili-ngrok
    restart: unless-stopped
    depends_on:
      lili-bot:
        condition: service_healthy
    command:
      - "http"
      - "lili-bot:5000"
      - "--log=stdout"
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTH_TOKEN}
    networks:
      - lili-net
    ports:
      - "4040:4040"
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

volumes:
  lili-data:
    name: lili-bot-data

networks:
  lili-net:
    name: lili-network
